server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # SECURITY: Deny access to hidden files (e.g. .env, .git, .htaccess)
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # SECURITY: Deny access to sensitive file extensions
    location ~* \.(env|ini|log|conf|sh|sql|bak|php|py|rb|yaml|yml|json|xml|bak|old|orig|swp|save|tmp|dist|map)$ {
        deny all;
        return 404;
    }
    
    # HTML files should not be cached (so updates appear immediately)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Static assets can be cached (they have content hashes)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # The root URL returns index.html - also no-cache
    # This MUST be last so security rules above take priority
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
