<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- TrustOffice Vertical Logo - Clean Vector -->
  <!-- Checkmark / Shield icon -->
  <g transform="translate(100, 20)">
    <!-- Outer circle -->
    <circle cx="100" cy="100" r="95" fill="#010079"/>
    <!-- Checkmark -->
    <path d="M55 100 L85 130 L145 70" stroke="#d5ad36" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text: TrustOffice -->
  <text x="200" y="280" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="42" font-weight="700" fill="#010079" letter-spacing="1">TrustOffice</text>
  <!-- Tagline -->
  <text x="200" y="320" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#666" letter-spacing="4" text-transform="uppercase">TRUST GOVERNANCE</text>
</svg>